openapi: 3.1.0
info:
  title: JadeAI Career API
  version: 0.4.0
  description: |
    Living API contract for the JadeAI Career fork. Paths marked
    x-implementation-status: planned are not available yet.
servers:
  - url: /
security:
  - cookieSession: []

tags:
  - name: Auth
  - name: Admin
  - name: LLM
  - name: GitHub
  - name: Knowledge
  - name: ResumeChange
  - name: JD
  - name: Jobs

paths:
  /api/auth/register:
    get:
      tags: [Auth]
      operationId: getRegistrationAvailability
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      security: []
      responses:
        '200':
          description: Current self-registration mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationModeResponse'
    post:
      tags: [Auth]
      operationId: register
      x-requirement-id: AUTH-001
      x-implementation-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/login:
    post:
      tags: [Auth]
      operationId: login
      x-requirement-id: AUTH-001
      x-implementation-status: implemented
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authenticated and session cookie created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      x-requirement-id: AUTH-001
      x-implementation-status: implemented
      responses:
        '204':
          description: Current session revoked and cookie cleared

  /api/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      x-requirement-id: AUTH-001
      x-implementation-status: implemented
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Auth]
      operationId: updateCurrentUser
      x-requirement-id: AUTH-001
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 100
                email:
                  type: [string, 'null']
                  format: email
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/me/password:
    post:
      tags: [Auth]
      operationId: changePassword
      x-requirement-id: AUTH-004
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  writeOnly: true
                newPassword:
                  type: string
                  minLength: 12
                  maxLength: 256
                  writeOnly: true
      responses:
        '204':
          description: Password changed and old sessions revoked
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/admin/users:
    get:
      tags: [Admin]
      operationId: listUsers
      x-requirement-id: AUTH-003
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - name: query
          in: query
          schema:
            type: string
            maxLength: 120
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                type: object
                required: [items, total, page, pageSize]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUserSummary'
                  total:
                    type: integer
                    minimum: 0
                  page:
                    type: integer
                    minimum: 1
                  pageSize:
                    type: integer
                    minimum: 1
                    maximum: 100
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/users/{userId}:
    patch:
      tags: [Admin]
      operationId: updateUserByAdmin
      x-requirement-id: AUTH-003
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                status:
                  $ref: '#/components/schemas/UserStatus'
                role:
                  $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserSummary'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/admin/registration:
    get:
      tags: [Admin]
      operationId: getRegistrationMode
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      responses:
        '200':
          description: Registration mode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationModeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      tags: [Admin]
      operationId: setRegistrationMode
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationModeResponse'
      responses:
        '200':
          description: Registration mode updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistrationModeResponse'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/invitations:
    get:
      tags: [Admin]
      operationId: listInvitations
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      responses:
        '200':
          description: Invitation metadata without plaintext codes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invitation'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Admin]
      operationId: createInvitation
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                maxUses:
                  type: integer
                  minimum: 1
                  maximum: 1000
                expiresInDays:
                  type: [integer, 'null']
                  minimum: 1
                  maximum: 365
      responses:
        '201':
          description: Invitation created; plaintext code is returned only once
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Invitation'
                  - type: object
                    required: [code]
                    properties:
                      code:
                        type: string
                        writeOnly: true
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/admin/invitations/{invitationId}:
    delete:
      tags: [Admin]
      operationId: disableInvitation
      x-requirement-id: AUTH-002
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/InvitationId'
      responses:
        '204':
          description: Invitation disabled
        '404':
          $ref: '#/components/responses/NotFound'

  /api/llm-profiles:
    get:
      tags: [LLM]
      operationId: listLlmProfiles
      x-requirement-id: LLM-001
      x-implementation-status: implemented
      responses:
        '200':
          description: User-owned profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LlmProfile'
    post:
      tags: [LLM]
      operationId: createLlmProfile
      x-requirement-id: LLM-001
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProfileCreateInput'
      responses:
        '201':
          description: Created without returning plaintext key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/llm-profiles/{profileId}:
    patch:
      tags: [LLM]
      operationId: updateLlmProfile
      x-requirement-id: LLM-001
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LlmProfileInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProfile'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [LLM]
      operationId: deleteLlmProfile
      x-requirement-id: LLM-001
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '204':
          description: Deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /api/llm-bindings:
    get:
      tags: [LLM]
      operationId: listLlmFeatureBindings
      x-requirement-id: LLM-004
      x-implementation-status: implemented
      responses:
        '200':
          description: User-owned default profile bindings by feature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmFeatureBindings'

  /api/llm-bindings/{feature}:
    put:
      tags: [LLM]
      operationId: setLlmFeatureBinding
      x-requirement-id: LLM-004
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/LlmFeature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [profileId]
              properties:
                profileId:
                  type: [string, 'null']
                  format: uuid
      responses:
        '200':
          description: Binding updated; null removes the binding
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [feature, profileId]
                properties:
                  feature:
                    type: string
                    enum: [resume, jd, vision, interview]
                  profileId:
                    type: [string, 'null']
                    format: uuid
        '404':
          $ref: '#/components/responses/NotFound'

  /api/llm-profiles/{profileId}/test:
    post:
      tags: [LLM]
      operationId: testLlmProfile
      x-requirement-id: LLM-003
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Updated safe profile including the persisted capability report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LlmProfile'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/ai/models:
    get:
      tags: [LLM]
      operationId: listOwnedLlmProfileModels
      x-requirement-id: LLM-001
      x-implementation-status: implemented
      parameters:
        - name: profileId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Deduplicated model IDs returned through the selected owned profile
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [models]
                properties:
                  models:
                    type: array
                    maxItems: 1000
                    items:
                      type: object
                      additionalProperties: false
                      required: [id]
                      properties:
                        id:
                          type: string
                          maxLength: 200
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          description: Provider model list could not be read safely

  /api/github/connect:
    post:
      tags: [GitHub]
      operationId: beginGithubConnection
      x-requirement-id: GH-001
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                returnPath:
                  type: string
                  maxLength: 512
      responses:
        '201':
          description: Short-lived GitHub App installation URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubConnectionStart'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/github/callback:
    get:
      tags: [GitHub]
      operationId: completeGithubConnection
      x-requirement-id: GH-001
      x-implementation-status: implemented
      parameters:
        - name: state
          in: query
          schema:
            type: string
        - name: installation_id
          in: query
          schema:
            type: string
            pattern: '^\d{1,30}$'
        - name: setup_action
          in: query
          schema:
            type: string
      responses:
        '307':
          description: Redirect to the validated locale knowledge page with a connection result
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/github/connections:
    get:
      tags: [GitHub]
      operationId: listGithubConnections
      x-requirement-id: GH-001
      x-implementation-status: implemented
      responses:
        '200':
          description: Current user's GitHub connections and recent sync summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubConnectionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/github/pat-connections:
    get:
      tags: [GitHub]
      operationId: listGithubPatConnections
      x-requirement-id: GH-007
      x-implementation-status: implemented
      responses:
        '200':
          description: Current user's sanitized Fine-grained PAT connections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubPatConnectionSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [GitHub]
      operationId: createGithubPatConnection
      x-requirement-id: GH-007
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GitHubPatConnectionRequest'
      responses:
        '201':
          description: Token verified and encrypted connection created; plaintext token is never returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubPatConnectionCreated'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Session is missing or the submitted PAT was rejected by GitHub
        '403':
          $ref: '#/components/responses/Forbidden'
        '413':
          description: Request body exceeds the bounded JSON limit
        '415':
          description: Content-Type is not application/json
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          description: GitHub could not be reached or returned an invalid bounded response
        '503':
          description: The server encryption keyring is unavailable

  /api/github/pat-connections/{connectionId}:
    delete:
      tags: [GitHub]
      operationId: revokeGithubPatConnection
      x-requirement-id: GH-007
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      responses:
        '204':
          description: Credential ciphertext deleted and repositories deselected
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/github/pat-connections/{connectionId}/repositories:
    get:
      tags: [GitHub]
      operationId: listGithubPatRepositories
      x-requirement-id: GH-007
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      responses:
        '200':
          description: Repositories currently accessible through the owned PAT connection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubAvailableRepository'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          description: GitHub could not be reached or returned an invalid bounded response
        '503':
          description: The encrypted credential cannot currently be decrypted
    put:
      tags: [GitHub]
      operationId: selectGithubPatRepositories
      x-requirement-id: GH-007
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/ConnectionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [repositoryIds]
              properties:
                repositoryIds:
                  type: array
                  maxItems: 100
                  uniqueItems: true
                  items:
                    type: string
                    pattern: '^\d{1,30}$'
      responses:
        '200':
          description: Persisted repositories explicitly selected under the owned PAT connection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubSelectedRepository'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '413':
          description: Request body exceeds the bounded JSON limit
        '415':
          description: Content-Type is not application/json
        '422':
          $ref: '#/components/responses/Unprocessable'
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          description: GitHub could not be reached or returned an invalid bounded response
        '503':
          description: The encrypted credential cannot currently be decrypted

  /api/github/repositories:
    get:
      tags: [GitHub]
      operationId: listGithubRepositories
      x-requirement-id: GH-001
      x-implementation-status: implemented
      parameters:
        - name: connectionId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Repositories available to the current user connection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubAvailableRepository'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [GitHub]
      operationId: selectGithubRepositories
      x-requirement-id: GH-001
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [connectionId, repositoryIds]
              properties:
                connectionId:
                  type: string
                  format: uuid
                repositoryIds:
                  type: array
                  maxItems: 100
                  uniqueItems: true
                  items:
                    type: string
                    pattern: '^\d{1,30}$'
      responses:
        '200':
          description: Persisted user-owned repository selection
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitHubSelectedRepository'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/Unprocessable'

  /api/github/repositories/{repositoryId}/sync:
    post:
      tags: [GitHub]
      operationId: syncGithubRepository
      x-requirement-id: GH-003
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/RepositoryId'
      responses:
        '202':
          description: Idempotent sync job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubSyncAccepted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/github/sync-jobs/{jobId}:
    get:
      tags: [GitHub]
      operationId: getGithubSyncJob
      x-requirement-id: GH-003
      x-implementation-status: implemented
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Current user's GitHub sync job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GitHubSyncJob'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/github/webhooks:
    post:
      tags: [GitHub]
      operationId: receiveGithubWebhook
      x-requirement-id: GH-003
      x-implementation-status: implemented
      security: []
      parameters:
        - name: X-Hub-Signature-256
          in: header
          required: true
          schema:
            type: string
        - name: X-GitHub-Delivery
          in: header
          required: true
          schema:
            type: string
        - name: X-GitHub-Event
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '202':
          description: Signature-verified event accepted, ignored, or already processed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid signature
        '413':
          description: Payload exceeds one MiB

  /api/sources/github-public:
    get:
      tags: [Knowledge]
      operationId: listPublicGitHubSources
      x-requirement-id: GH-006
      x-implementation-status: implemented
      responses:
        '200':
          description: Current user's imported public GitHub sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PublicGitHubSource'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Knowledge]
      operationId: importPublicGitHubSource
      x-requirement-id: GH-006
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicGitHubImportRequest'
      responses:
        '200':
          description: The repository HEAD was already imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicGitHubImportResult'
        '201':
          description: A new immutable public GitHub revision and reviewable facts were imported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicGitHubImportResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '413':
          description: JSON request exceeds the authentication API body boundary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '415':
          description: Content-Type is not application/json
          content:
            application/json:
