          type: boolean
        tools:
          type: boolean
        vision:
          type: boolean
        errors:
          type: object
          additionalProperties: false
          properties:
            reachable:
              type: string
              enum: [AUTH_FAILED, MODEL_NOT_FOUND, RATE_LIMITED, TIMEOUT, OUTBOUND_BLOCKED, PROVIDER_ERROR, INVALID_RESPONSE, UNSUPPORTED]
            json:
              type: string
              enum: [AUTH_FAILED, MODEL_NOT_FOUND, RATE_LIMITED, TIMEOUT, OUTBOUND_BLOCKED, PROVIDER_ERROR, INVALID_RESPONSE, UNSUPPORTED]
            tools:
              type: string
              enum: [AUTH_FAILED, MODEL_NOT_FOUND, RATE_LIMITED, TIMEOUT, OUTBOUND_BLOCKED, PROVIDER_ERROR, INVALID_RESPONSE, UNSUPPORTED]
            vision:
              type: string
              enum: [AUTH_FAILED, MODEL_NOT_FOUND, RATE_LIMITED, TIMEOUT, OUTBOUND_BLOCKED, PROVIDER_ERROR, INVALID_RESPONSE, UNSUPPORTED]
