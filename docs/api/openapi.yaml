        name:
          type: string
        lastRevision:
          type: [string, 'null']
          pattern: '^[a-f0-9]{64}$'
        lastImportedAt:
          type: [string, 'null']
          format: date-time

    WorkResumeUploadResult:
      type: object
      additionalProperties: false
