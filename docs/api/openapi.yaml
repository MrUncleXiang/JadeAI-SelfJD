      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        provider:
          type: string
          enum: [openai-compatible, anthropic, gemini]
        baseUrl:
          type: string
          format: uri
        modelName:
          type: string
          minLength: 1
          maxLength: 200
        apiKey:
          type: string
          minLength: 1
          maxLength: 8192
          writeOnly: true

    LlmProfileInput:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
        provider:
          type: string
          enum: [openai-compatible, anthropic, gemini]
        baseUrl:
          type: string
          format: uri
        modelName:
          type: string
          minLength: 1
          maxLength: 200
        apiKey:
          type: string
          minLength: 1
          maxLength: 8192
          writeOnly: true

    LlmProfile:
      type: object
      additionalProperties: false
      required: [id, name, provider, baseUrl, modelName, hasApiKey, status, capabilities, lastTestedAt, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        name:
