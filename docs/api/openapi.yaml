          minimum: 0
        factsCreated:
          type: integer
          minimum: 0
        factsReused:
          type: integer
          minimum: 0
        evidenceCreated:
          type: integer
          minimum: 0
        claimsCreated:
          type: integer
          minimum: 0
        evidenceMarkedStale:
          type: integer
          minimum: 0

