      type: object
      additionalProperties: false
      required: [schemaVersion, resumeId, baseVersionId, summary, operations, warnings]
      properties:
        schemaVersion:
          type: integer
          const: 1
        resumeId:
          type: string
        baseVersionId:
          type: string
        summary:
          type: string
          minLength: 1
          maxLength: 2000
        operations:
          type: array
          minItems: 1
          maxItems: 50
          items:
            $ref: '#/components/schemas/ResumePatchCandidateOperation'
        warnings:
          type: array
          maxItems: 20
          items:
            type: string
            minLength: 1
            maxLength: 1000

    ResumePatchCandidateOperation:
      type: object
      additionalProperties: false
      description: |
        Strict ResumePatch v1 discriminated operation. Required target/value fields
        vary by operation type and are revalidated by the server before persistence.
      required: [operationId, type, expectedHash, reason, evidenceIds, jdRequirementIds, confidence]
      properties:
        operationId:
          type: string
          minLength: 1
          maxLength: 200
        type:
          type: string
          enum:
            - set_field
            - add_item
            - update_item
            - remove_item
            - add_section
            - remove_section
            - move_section
            - set_visibility
            - set_template
        sectionId:
          type: [string, 'null']
        itemId:
          type: [string, 'null']
        expectedHash:
          type: string
          pattern: '^sha256:[a-f0-9]{64}$'
        value: {}
        reason:
          type: string
          minLength: 1
          maxLength: 1000
        evidenceIds:
          type: array
          maxItems: 50
          items:
            type: string
        jdRequirementIds:
          type: array
          maxItems: 50
          items:
            type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1

    ResumeChangeSet:
      type: object
      required: [id, resumeId, baseVersionId, status, operations]
      properties:
        id:
          type: string
          format: uuid
        resumeId:
          type: string
          format: uuid
        baseVersionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [proposed, validated, stale, partially_applied, applied, rejected, failed]
        summary:
          type: string
        warnings:
          type: array
          items:
            type: string
        appliedVersionId:
          type: [string, 'null']
        operations:
          type: array
          items:
            $ref: '#/components/schemas/ResumeChangeOperation'

    ResumeChangeOperation:
      type: object
      required: [operationId, type, reason, evidenceIds, jdRequirementIds, confidence, diff, selected, result]
      properties:
        operationId:
          type: string
        type:
          type: string
          enum:
            - set_field
            - add_item
            - update_item
            - remove_item
            - add_section
            - remove_section
            - move_section
            - set_visibility
            - set_template
        sectionId:
          type: [string, 'null']
        itemId:
          type: [string, 'null']
        expectedHash:
          type: [string, 'null']
        value: {}
        reason:
          type: string
        evidenceIds:
          type: array
          items:
            type: string
            format: uuid
        jdRequirementIds:
          type: array
          items:
            type: string
            format: uuid
        confidence:
          type: number
          minimum: 0
          maximum: 1
        diff:
          type: object
          description: Server-computed before/after preview; model-supplied diff values are ignored.
        selected:
          type: boolean
        result:
          type: string
          enum: [pending, applied, not_selected, failed]
        errorCode:
          type: [string, 'null']

    ResumeVersionSummary:
      type: object
      required: [id, versionNumber, source, createdAt]
      properties:
        id:
          type: string
          format: uuid
        versionNumber:
          type: integer
          minimum: 1
        source:
          type: string
          enum: [manual, ai-change-set, restore, import]
        createdAt:
          type: string
          format: date-time

    JdRequirementInput:
      type: object
      additionalProperties: false
      required: [requirementType, text]
      properties:
        id:
          type: string
          format: uuid
        requirementType:
          type: string
          enum: [responsibility, hard_skill, soft_skill, experience, education, preferred]
        text:
          type: string
          minLength: 1
          maxLength: 2000
        normalizedTerm:
          type: string
          maxLength: 240
        aliases:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 120
        priority:
          type: string
          enum: [required, preferred, normal]
        importance:
          type: number
          minimum: 0
          maximum: 1
        sourceLocator:
          type: object
          additionalProperties: true

    JdRequirement:
      allOf:
        - $ref: '#/components/schemas/JdRequirementInput'
        - type: object
          required: [id, normalizedTerm, aliases, priority, importance, sourceLocator, sortOrder]
          properties:
            sortOrder:
              type: integer
              minimum: 0

    JdSource:
      type: object
      required: [id, inputType, title, company, jobTitle, location, contentHash, normalizedText, status, requirements]
      properties:
        id:
          type: string
          format: uuid
        inputType:
          type: string
          enum: [text, pdf, docx, image]
        title:
          type: string
        company:
          type: string
        jobTitle:
          type: string
        location:
          type: string
        originalFilename:
          type: [string, 'null']
        mimeType:
          type: [string, 'null']
        sizeBytes:
          type: [integer, 'null']
          minimum: 0
        contentHash:
          type: string
        normalizedText:
          type: string
        status:
          type: string
          enum: [draft, parsing, needs_review, confirmed, failed]
        parserId:
          type: [string, 'null']
        parserVersion:
          type: [string, 'null']
        errorCode:
          type: [string, 'null']
        lastRequestId:
          type: [string, 'null']
          description: Request ID for the most recent extraction attempt, retained for persistent diagnostics.
        confirmedAt:
          type: [string, 'null']
          format: date-time
        createdAt:
          type: [string, 'null']
          format: date-time
        updatedAt:
          type: [string, 'null']
          format: date-time
        deduplicated:
          type: boolean
          description: Present on creation responses; true when an existing source was returned.
        requirements:
          type: array
          items:
            $ref: '#/components/schemas/JdRequirement'

    Job:
      type: object
      required: [id, type, status, attempts]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        status:
          type: string
          enum: [queued, running, retrying, succeeded, failed, cancelled]
        attempts:
          type: integer
          minimum: 0
        errorCode:
          type: [string, 'null']
        resourceId:
          type: [string, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
