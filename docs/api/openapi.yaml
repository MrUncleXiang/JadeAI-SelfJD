components:
  securitySchemes:
    cookieSession:
      type: apiKey
      in: cookie
      name: jade_session

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LlmFeature:
      name: feature
      in: path
      required: true
      schema:
        type: string
        enum: [resume, jd, vision, interview]
    RepositoryId:
      name: repositoryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ConnectionId:
      name: connectionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FactId:
      name: factId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResumeId:
      name: resumeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChangeSetId:
      name: changeSetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JdSourceId:
      name: jdSourceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      name: jobId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Operation is not allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Resource state conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unprocessable:
      description: Domain validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests
      headers:
        Retry-After:
          description: Seconds until another attempt is allowed
          schema:
            type: integer
            minimum: 1
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      additionalProperties: false
      required: [code, message, requestId]
      properties:
        code:
          type: string
        message:
          type: string
        requestId:
          type: string

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        email:
          type: [string, 'null']
          format: email
        displayName:
          type: [string, 'null']
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 12
          maxLength: 256
          writeOnly: true
        invitationCode:
          type: [string, 'null']
          writeOnly: true

    LoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, password]
      properties:
        identifier:
          type: string
          minLength: 1
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 1024
          writeOnly: true

    RegistrationMode:
      type: string
      enum: [closed, invite, open]

    RegistrationModeResponse:
      type: object
      additionalProperties: false
      required: [mode]
      properties:
        mode:
          $ref: '#/components/schemas/RegistrationMode'

    UserRole:
      type: string
      enum: [admin, user]

    UserStatus:
      type: string
      enum: [active, disabled, pending]

    CurrentUser:
      type: object
      additionalProperties: false
      required: [id, username, email, displayName, avatarUrl, authType, role, status]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        displayName:
          type: string
        avatarUrl:
          type: [string, 'null']
          format: uri
        authType:
          type: string
          enum: [password, oauth, fingerprint]
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'

    AdminUserSummary:
      type: object
      additionalProperties: false
      required: [id, username, email, displayName, avatarUrl, authType, role, status, createdAt, lastLoginAt]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: [string, 'null']
        email:
          type: [string, 'null']
          format: email
        displayName:
          type: string
        avatarUrl:
          type: [string, 'null']
          format: uri
        authType:
          type: string
          enum: [password, oauth, fingerprint]
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: [string, 'null']
          format: date-time
        lastLoginAt:
          type: [string, 'null']
          format: date-time

    Invitation:
      type: object
      additionalProperties: false
      required: [id, maxUses, useCount, expiresAt, createdBy, createdAt, disabledAt]
      properties:
        id:
          type: string
          format: uuid
        maxUses:
          type: integer
          minimum: 1
        useCount:
          type: integer
          minimum: 0
        expiresAt:
          type: [string, 'null']
          format: date-time
        createdBy:
          type: [string, 'null']
          format: uuid
        createdAt:
          type: [string, 'null']
          format: date-time
        disabledAt:
          type: [string, 'null']
          format: date-time

    LlmProfileCreateInput:
      type: object
      additionalProperties: false
