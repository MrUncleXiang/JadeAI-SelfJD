version: 1
product: JadeAI Career
updatedAt: 2026-07-17

scope:
  deployment: self-hosted-single-instance
  productionDatabase: postgresql
  githubDirection: read-only-import
  excludedCapabilities:
    - wechat
    - qq
    - opentalking
    - voice-interview
    - digital-human

policy:
  maxAutomaticRepairAttemptsPerFailureSignature: 3
  forbidSkippingTestsToPass: true
  forbidAutomaticSpecRelaxation: true
  requireHumanGateFor:
    - authentication-policy
    - database-migration
    - encryption-key-change
    - github-app-credentials
    - production-deployment
    - destructive-filesystem-operation

gates:
  phase0:
    commands:
      - pnpm spec:check
  pullRequest:
    commands:
      - pnpm spec:check
      - pnpm lint
      - pnpm type-check
      - pnpm test
  release:
    commands:
      - pnpm spec:check
      - pnpm lint
      - pnpm type-check
      - pnpm test
      - pnpm test:integration
      - pnpm test:contract
      - pnpm test:e2e
      - pnpm test:security
      - pnpm test:migration
      - pnpm test:artifacts

